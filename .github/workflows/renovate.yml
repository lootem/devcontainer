name: Renovate

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      # PAT, not GITHUB_TOKEN: PRs from GITHUB_TOKEN don't trigger the build
      # check, so automerge would never get a green status to merge on.
      - uses: renovatebot/github-action@v46.1.18
        with:
          configurationFile: .github/renovate-global.json5
          token: ${{ secrets.RENOVATE_TOKEN }}
