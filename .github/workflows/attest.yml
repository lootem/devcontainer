name: Attest Install Scripts

# Attests the scripts that get curl|bash'd by users (install.sh, and
# update.sh in every generated repo) so `gh attestation verify` can prove
# "this file came from a workflow run in this repo at commit X". That's a
# provenance guarantee, not a content-safety one - see README "Verify before
# you run".
on:
  push:
    branches: [main]
    paths:
      - install.sh
      - .devcontainer/update.sh
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  attest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            install.sh
            .devcontainer/update.sh
