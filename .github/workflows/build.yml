name: Docker Build

# Runs on every PR so it can be a required status check without wedging PRs
# that don't touch the Dockerfile: the job always reports a result, but only
# rebuilds the image when the Dockerfile actually changed. (A path filter here
# would leave the required check permanently pending on unrelated PRs.)
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      dockerfile: ${{ steps.changed.outputs.dockerfile }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Did the Dockerfile change?
        id: changed
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi
          # Build when we can't compute a diff (first push / missing base) to stay safe.
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$base" 2>/dev/null; then
            changed=true
          elif git diff --name-only "$base" "$head" | grep -qx '.devcontainer/Dockerfile'; then
            changed=true
          else
            changed=false
          fi
          echo "dockerfile=$changed" >> "$GITHUB_OUTPUT"

  # Always runs (job-level, not gated) so it stays a valid required status
  # check on PRs that don't touch the Dockerfile - steps below no-op instead.
  build:
    needs: detect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        # Skip on push to main: a Dockerfile change there is validated by the
        # publish job's all-features `all` image, so building all-on here too
        # would be a redundant second build. PRs + manual dispatch still build.
        if: needs.detect.outputs.dockerfile == 'true' && github.event_name != 'push'

      # Build with every feature ARG on so a bump to any feature layer
      # (azcli/pwsh/azpwsh/awscli included) actually compiles, not just the
      # default python/go/js/dotnet baseline. Never pushed - PRs never get
      # registry credentials.
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        if: needs.detect.outputs.dockerfile == 'true' && github.event_name != 'push'
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: false
          build-args: |
            GOLANG=true
            PYTHON=true
            NODEJS=true
            DOTNET=true
            AZCLI=true
            POWERSHELL=true
            AZPWSH=true
            AWSCLI=true

  # Publishes the standalone Docker Hub images (see README "pull & run"). Only
  # fires on a Dockerfile change landing on main - never on PRs, so registry
  # credentials are never exposed to a PR build. install.sh remains the
  # reproducible, pinned path; these are rolling convenience tags.
  publish:
    needs: detect
    if: needs.detect.outputs.dockerfile == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Every feature ARG defaults to false in the Dockerfile, so each
          # per-language image only needs its own flag flipped on. (The `all`
          # image below is the only one that pulls in the CLIs.)
          - tag: python
            build-args: |
              PYTHON=true
          - tag: go
            build-args: |
              GOLANG=true
          - tag: js
            build-args: |
              NODEJS=true
          - tag: dotnet
            build-args: |
              DOTNET=true
          - tag: all
            build-args: |
              GOLANG=true
              PYTHON=true
              NODEJS=true
              DOTNET=true
              AZCLI=true
              POWERSHELL=true
              AZPWSH=true
              AWSCLI=true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: true
          platforms: linux/amd64
          tags: lootemsec/devcontainer:${{ matrix.tag }}
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha,scope=${{ matrix.tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.tag }}
