name: Docker Build

on:
  pull_request:
    paths:
      - .devcontainer/Dockerfile
      - .github/workflows/build.yml
  push:
    branches: [main]
    paths:
      - .devcontainer/Dockerfile
      - .github/workflows/build.yml
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      # Build with every feature ARG on — a bump to azcli/pwsh/azpwsh/awscli
      # (or any other non-default feature) must actually compile that layer,
      # not just the default python/go/js/dotnet=false baseline. This is the
      # required status check that gates Renovate automerge.
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: false
          build-args: |
            GOLANG=true
            PYTHON=true
            NODEJS=true
            DOTNET=true
            AZCLI=true
            POWERSHELL=true
            AZPWSH=true
            AWSCLI=true
