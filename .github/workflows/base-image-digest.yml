name: Base Image Digest Bump

on:
  schedule:
    # Offset from renovate.yml's Monday 05:00 run so the two don't race to
    # merge into main at the same time (a base-image merge mid-Renovate-run
    # trips Renovate's "repository has changed" abort).
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # trixie is a rolling tag Renovate can't reliably date, so resolve the
      # digest and the image's age here and apply the same 7-day gate.
      # `imagetools inspect` resolves the multi-arch index digest directly
      # from the registry (deterministic), rather than `docker pull` +
      # `RepoDigests[0]`, which is only stable for whichever single-arch
      # manifest the local daemon happened to pull.
      - name: Resolve digest and age
        id: resolve
        run: |
          set -euo pipefail
          IMAGE="mcr.microsoft.com/devcontainers/base:trixie"
          NEW_DIGEST=$(docker buildx imagetools inspect "$IMAGE" --format '{{json .Manifest.Digest}}' | jq -r .)
          docker pull "$IMAGE" >/dev/null
          CREATED=$(docker inspect --format='{{.Created}}' "$IMAGE")
          AGE_DAYS=$(( ( $(date +%s) - $(date -d "$CREATED" +%s) ) / 86400 ))
          CURRENT_DIGEST=$(grep -oP '(?<=trixie@)sha256:[0-9a-f]+' .devcontainer/Dockerfile)
          echo "digest=$NEW_DIGEST" >> "$GITHUB_OUTPUT"
          echo "age_days=$AGE_DAYS" >> "$GITHUB_OUTPUT"
          echo "current_digest=$CURRENT_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Update Dockerfile
        id: update
        if: steps.resolve.outputs.digest != steps.resolve.outputs.current_digest && steps.resolve.outputs.age_days >= 7
        run: |
          set -euo pipefail
          sed -i "s|trixie@${{ steps.resolve.outputs.current_digest }}|trixie@${{ steps.resolve.outputs.digest }}|" .devcontainer/Dockerfile
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open PR
        if: steps.update.outputs.changed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
          commit-message: 'chore(deps): bump devcontainers/base:trixie digest'
          title: 'chore(deps): bump devcontainers/base:trixie base image digest'
          body: |
            Bumps the `trixie` base image digest to the current tip.

            Image age: ${{ steps.resolve.outputs.age_days }} days (meets the 7-day gate).
          branch: bump-base-image-digest
          delete-branch: true

      - name: Enable automerge
        if: steps.cpr.outputs.pull-request-operation == 'created'
        env:
          GH_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
        run: gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-url }}"
